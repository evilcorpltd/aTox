[versions]
kotlin = "1.4.32"
coroutines = "1.4.3"
dagger = "2.35.1"
navigation = "2.3.5"
lifecycle = "2.3.1"
room = "2.3.0"
androidx-test = "1.3.0"
tox4j-core = "0.2.3"
tox4j-android = "0.2.12"
espresso = "3.3.0"

[libraries]
androidx-appcompat = "androidx.appcompat:appcompat:1.2.0"
androidx-constraintlayout = "androidx.constraintlayout:constraintlayout:2.0.4"
androidx-core-ktx = "androidx.core:core-ktx:1.5.0-rc02"

androidx-lifecycle-livedata-ktx = { module = "androidx.lifecycle:lifecycle-livedata-ktx", version.ref = "lifecycle" }
androidx-lifecycle-service = { module = "androidx.lifecycle:lifecycle-service", version.ref = "lifecycle" }
androidx-lifecycle-viewmodel-ktx = { module = "androidx.lifecycle:lifecycle-viewmodel-ktx", version.ref = "lifecycle" }

androidx-multidex = "androidx.multidex:multidex:2.0.1"
androidx-navigation-fragment-ktx = { module = "androidx.navigation:navigation-fragment-ktx", version.ref = "navigation" }
androidx-navigation-ui-ktx = { module = "androidx.navigation:navigation-ui-ktx", version.ref = "navigation" }
androidx-preference = "androidx.preference:preference:1.1.1"

androidx-room-compiler = { module = "androidx.room:room-compiler", version.ref = "room" }
androidx-room-ktx = { module = "androidx.room:room-ktx", version.ref = "room" }
androidx-room-runtime = { module = "androidx.room:room-runtime", version.ref = "room" }
androidx-room-testing = { module = "androidx.room:room-testing", version.ref = "room" }

google-android-material = "com.google.android.material:material:1.3.0"
google-dagger-core = { module = "com.google.dagger:dagger", version.ref = "dagger" }
google-dagger-compiler = { module = "com.google.dagger:dagger-compiler", version.ref = "dagger" }

javax-inject = "javax.inject:javax.inject:1"

kotlinx-coroutines-android = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-android", version.ref = "coroutines" }
kotlinx-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "coroutines" }
kotlinx-coroutines-test = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-test", version.ref = "coroutines" }

# plugin-android-application = "com.android.application"
# plugin-android-gradle = "com.android.tools.build:gradle:4.2.1"
# plugin-android-library = "com.android.library"
# plugin-gradle-updates = "com.github.ben-manes:gradle-versions-plugin:0.38.0"
# plugin-idea-ext = "org.jetbrains.gradle.plugin.idea-ext:1.0"
# plugin-kotlin-android = "kotlin-android"
# plugin-kotlin-gradle = { module = "org.jetbrains.kotlin:kotlin-gradle-plugin", version.ref = "kotlin" }
# plugin-kotlin-kapt = "kotlin-kapt"

square-leakcanary = "com.squareup.leakcanary:leakcanary-android:2.7"
square-picasso = "com.squareup.picasso:picasso:2.8"

test-espresso-contrib = { module = "androidx.test.espresso:espresso-contrib", version.ref = "espresso" }
test-espresso-core = { module = "androidx.test.espresso:espresso-core", version.ref = "espresso" }
test-junit-core = "junit:junit:4.13.2"
test-junit-ext = "androidx.test.ext:junit:1.1.2"
test-mockk = "io.mockk:mockk-android:1.11.0"
test-rules = { module = "androidx.test:rules", version.ref = "androidx-test" }
test-runner = { module = "androidx.test:runner", version.ref = "androidx-test" }

tox4j-android-aarch64 = { module = "org.toktok:tox4j-c_aarch64-linux-android", version.ref = "tox4j-android" }
tox4j-android-arm = { module = "org.toktok:tox4j-c_armv7a-linux-androideabi", version.ref = "tox4j-android" }
tox4j-android-i686 = { module = "org.toktok:tox4j-c_i686-linux-android", version.ref = "tox4j-android" }
tox4j-android-amd64 = { module = "org.toktok:tox4j-c_x86_64-linux-android", version.ref = "tox4j-android" }
tox4j-api = { module = "org.toktok:tox4j-api_2.11", version.ref = "tox4j-core" }
tox4j-c = { module = "org.toktok:tox4j-c_2.11", version.ref = "tox4j-core" }
